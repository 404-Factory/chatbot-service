apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-service
  namespace: chatbot
  labels:
    app: chatbot-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot-service
  template:
    metadata:
      labels:
        app: chatbot-service
    spec:
      containers:
        - name: chatbot-service
          image: $IMAGE:$IMAGE_TAG
          ports:
            - containerPort: 8085
          envFrom:
            - secretRef:
                name: rdb-secret
            - secretRef:
                name: ai-secret
            - secretRef:
                name: s3-secret
          env:
            - name: DB_NAME
              value: "factory_db"
            - name: DB_PORT
              value: "3306"
            - name: DB_MAX_POOL_SIZE
              value: "2"
            - name: DB_MIN_IDLE
              value: "1"
            - name: S3_REALTIME_LOOKBACK_DAYS
              value: "3"
            - name: S3_ALLOW_BROAD_REALTIME_SCAN
              value: "false"
            - name: BEDROCK_MODEL_ID
              value: "anthropic.claude-3-haiku-20240307-v1:0"
            - name: BEDROCK_AGENT_ENABLE_TRACE
              value: "false"
            - name: BEDROCK_AGENT_CHAT_TIMEOUT_SECONDS
              value: "30"
            - name: BEDROCK_EXPLANATION_TIMEOUT_SECONDS
              value: "12"
            - name: BEDROCK_AGENT_API_CALL_TIMEOUT_SECONDS
              value: "180"
            - name: BEDROCK_AGENT_API_CALL_ATTEMPT_TIMEOUT_SECONDS
              value: "150"
            - name: BEDROCK_AGENT_HTTP_READ_TIMEOUT_SECONDS
              value: "150"
            - name: BEDROCK_AGENT_HTTP_CONNECTION_TIMEOUT_SECONDS
              value: "10"
            - name: CORS_ALLOWED_ORIGIN_PATTERNS
              value: "*"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
      restartPolicy: Always
