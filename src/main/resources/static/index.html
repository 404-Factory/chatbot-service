<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LGCNS Factory Management System</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Noto Sans KR', sans-serif;
    }

    body {
      background-color: #f5f7fb;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* 메인 대시보드 영역 영역 (왼쪽 빈 공간 시뮬레이션) */
    .main-content {
      flex: 1;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #888;
    }

    /* 오른쪽 챗봇 사이드바 컨테이너 (올려주신 이미지 스타일) */
    .chatbot-sidebar {
      width: 1000px;
      background-color: #ffffff;
      border-left: 1px solid #eef2f6;
      box-shadow: -4px 0 24px rgba(0, 0, 0, 0.03);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* 챗봇 헤더 */
    .chatbot-header {
      padding: 24px;
      border-bottom: 1px solid #f1f5f9;
    }

    .chatbot-header h2 {
      font-size: 20px;
      font-weight: 700;
      color: #1e293b;
    }

    /* 대화창 스크롤 영역 */
    .chat-messages {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 스크롤바 커스텀 */
    .chat-messages::-webkit-scrollbar {
      width: 6px;
    }
    .chat-messages::-webkit-scrollbar-thumb {
      background-color: #e2e8f0;
      border-radius: 4px;
    }

    /* 공통 메시지 말풍선 스타일 */
    .message-wrapper {
      display: flex;
      flex-direction: column;
      max-width: 85%;
    }

    /* 유저 메시지 (오른쪽 정렬) */
    .message-wrapper.user {
      align-self: flex-end;
    }

    /* 봇 메시지 (왼쪽 정렬) */
    .message-wrapper.bot {
      align-self: flex-start;
    }

    .message-sender {
      font-size: 12px;
      font-weight: 500;
      color: #64748b;
      margin-bottom: 4px;
      padding: 0 4px;
    }

    .message-wrapper.user .message-sender {
      align-self: flex-end;
    }

    .message-bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-all;
      white-space: pre-wrap; /* 줄바꿈 유지 */
    }

    /* 말풍선 색상 규격 */
    .message-wrapper.user .message-bubble {
      background-color: #2563eb; /* 모던한 블루 톤 */
      color: #ffffff;
      border-top-right-radius: 4px; /* 우상단 각진 효과 */
    }

    .message-wrapper.bot .message-bubble {
      background-color: #f1f5f9; /* 연한 그레이 톤 */
      color: #1e293b;
      border-top-left-radius: 4px; /* 좌상단 각진 효과 */
    }

    /* 하단 입력창 영역 */
    .chatbot-footer {
      padding: 20px 24px 30px 24px;
      border-top: 1px solid #f1f5f9;
    }

    /* 인풋 래퍼 (안에 버튼이 내장된 구조) */
    .input-container {
      display: flex;
      align-items: center;
      background-color: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      padding: 4px 6px 4px 16px;
      transition: border-color 0.2s;
    }

    .input-container:focus-within {
      border-color: #2563eb;
      background-color: #ffffff;
    }

    .input-container input {
      flex: 1;
      border: none;
      background: transparent;
      height: 40px;
      font-size: 14px;
      color: #1e293b;
      outline: none;
    }

    .input-container input::placeholder {
      color: #94a3b8;
    }

    /* 전송 버튼 아이콘 스타일 */
    .send-button {
      background-color: #2563eb;
      color: white;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .send-button:hover {
      background-color: #1d4ed8;
    }

    .send-button svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
      transform: translateX(1px); /* 화살표 정중앙 보정 */
    }

    /* 로딩 애니메이션 (점 세 개 깜빡임) */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 4px 8px;
    }
    .typing-indicator span {
      width: 6px;
      height: 6px;
      background-color: #94a3b8;
      border-radius: 50%;
      animation: blink 1.4s infinite both;
    }
    .typing-indicator span:nth-child(2) { animation-delay: .2s; }
    .typing-indicator span:nth-child(3) { animation-delay: .4s; }

    @keyframes blink {
      0%, 100% { opacity: .2; }
      20% { opacity: 1; }
    }
  </style>
</head>
<body>

<div class="main-content">
  <h1>LGCNS AM Inspire Camp 대시보드 메인 화면</h1>
  <p>오른쪽 사이드바에서 챗봇 기능을 사용할 수 있습니다.</p>
</div>

<div class="chatbot-sidebar">
  <div class="chatbot-header">
    <h2>Chatbot</h2>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="message-wrapper bot">
      <div class="message-sender">Bot</div>
      <div class="message-bubble">안녕하세요! Insight AI인 DANAI라고 합니다. 공정 관련 내용을 입력하면 답변하도록 하겠습니다.</div>
    </div>
  </div>

  <div class="chatbot-footer">
    <div class="input-container">
      <input type="text" id="userInput" placeholder="질문을 입력하세요..." onkeypress="handleKeyPress(event)">
      <button class="send-button" onclick="sendMessage()">
        <svg viewBox="0 0 24 24">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
  const chatMessages = document.getElementById('chatMessages');
  const userInput = document.getElementById('userInput');

  // 엔터키 키다운 이벤트 처리
  function handleKeyPress(event) {
    if (event.key === 'Enter') {
      sendMessage();
    }
  }

  // 메시지 전송 및 백엔드 API 호출
  async function sendMessage() {
    const prompt = userInput.value.trim();
    if (!prompt) return;

    // 1. 화면에 유저 메시지 추가
    appendMessage('user', 'You', prompt);
    userInput.value = '';

    // 2. 챗봇이 답변을 생각하는 동안 임시 로딩 대기창 표시
    const loadingIndicator = appendLoadingIndicator();
    chatMessages.scrollTop = chatMessages.scrollHeight;

    try {
      // 3. Spring Boot 백엔드로 POST 요청 (우리가 연결해 둔 API)
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ prompt: prompt })
      });

      if (!response.ok) {
        throw new Error('네트워크 연결 불안정');
      }

      const replyText = await response.text();

      // 4. 로딩 인디케이터 삭제 후 봇 실제 답변 추가
      loadingIndicator.remove();
      appendMessage('bot', 'Bot', replyText);

    } catch (error) {
      console.error(error);
      loadingIndicator.remove();
      appendMessage('bot', 'Bot', '❌ 에러가 발생했습니다. 백엔드 서버 상태를 확인해 주세요.');
    }

    // 5. 스크롤을 최하단으로 부드럽게 이동
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  // 메시지 화면 노출 템플릿 구조 생성 함수
  function appendMessage(type, sender, text) {
    const wrapper = document.createElement('div');
    wrapper.classList.add('message-wrapper', type);

    const senderDiv = document.createElement('div');
    senderDiv.classList.add('message-sender');
    senderDiv.innerText = sender;

    const bubbleDiv = document.createElement('div');
    bubbleDiv.classList.add('message-bubble');
    bubbleDiv.innerText = text;

    wrapper.appendChild(senderDiv);
    wrapper.appendChild(bubbleDiv);
    chatMessages.appendChild(wrapper);
  }

  // 봇 답변 대기용 로딩 점 애니메이션 생성 함수
  function appendLoadingIndicator() {
    const wrapper = document.createElement('div');
    wrapper.classList.add('message-wrapper', 'bot');

    const senderDiv = document.createElement('div');
    senderDiv.classList.add('message-sender');
    senderDiv.innerText = 'Bot';

    const bubbleDiv = document.createElement('div');
    bubbleDiv.classList.add('message-bubble');

    const indicator = document.createElement('div');
    indicator.classList.add('typing-indicator');
    indicator.innerHTML = '<span></span><span></span><span></span>';

    bubbleDiv.appendChild(indicator);
    wrapper.appendChild(senderDiv);
    wrapper.appendChild(bubbleDiv);
    chatMessages.appendChild(wrapper);

    return wrapper;
  }
</script>
</body>
</html>
