server:
  port: 8085

spring:
  application:
    name: chatbot_service

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    # 🔍 외부 환경 변수 시스템에서 값을 주입받도록 변경
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

aws:
  region: ap-northeast-2
  bedrock:
    # 🔍 AWS 관련 ID 정보도 보안을 위해 격리
    agent-id: ${AWS_AGENT_ID}
    agent-alias-id: ${AWS_AGENT_ALIAS_ID}

kind: Application