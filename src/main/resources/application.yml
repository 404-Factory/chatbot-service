server:
  port: 8085

logging:
  file:
    name: C:/temp/chatbot-service.log
  level:
    com.factory: DEBUG
    root: INFO
    com.factory.chatbot.event.handler: INFO

spring:
  application:
    name: chatbot_service

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: false
    consumer:
      group-id: chatbot-consumer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "*"

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${DB_URL:jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:chatbot_db}?sslMode=trust}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:12345678}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:2}
      minimum-idle: ${DB_MIN_IDLE:1}
      idle-timeout: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

sigma:
  event:
    consumer:
      topics: "Anomaly.event"
      groupId: "chatbot-consumer-group"
      subscription:
        - "AnalysisRequested"

aws:
  region: ap-northeast-2
  bedrock:
    # 🔍 AWS 관련 ID 정보도 보안을 위해 격리
    agent-id: ${AWS_AGENT_ID:}
    agent-alias-id: ${AWS_AGENT_ALIAS_ID:}

chatbot:
  s3:
    bucket-name: ${S3_BUCKET_NAME:}
    sensor-latest-key-template: sensor/{equipmentId}/latest.json
    realtime-prefix: ${S3_REALTIME_PREFIX:}
    realtime-lookback-days: ${S3_REALTIME_LOOKBACK_DAYS:3}
    allow-broad-realtime-scan: ${S3_ALLOW_BROAD_REALTIME_SCAN:false}

  bedrock:
    agent-id: ${BEDROCK_AGENT_ID:}
    agent-alias-id: ${BEDROCK_AGENT_ALIAS_ID:}
    model-id: ${BEDROCK_MODEL_ID:anthropic.claude-3-haiku-20240307-v1:0}
    enable-trace: ${BEDROCK_AGENT_ENABLE_TRACE:false}
    chat-timeout-seconds: ${BEDROCK_AGENT_CHAT_TIMEOUT_SECONDS:30}
    explanation-timeout-seconds: ${BEDROCK_EXPLANATION_TIMEOUT_SECONDS:12}
    api-call-timeout-seconds: ${BEDROCK_AGENT_API_CALL_TIMEOUT_SECONDS:180}
    api-call-attempt-timeout-seconds: ${BEDROCK_AGENT_API_CALL_ATTEMPT_TIMEOUT_SECONDS:150}
    http-read-timeout-seconds: ${BEDROCK_AGENT_HTTP_READ_TIMEOUT_SECONDS:150}
    http-connection-timeout-seconds: ${BEDROCK_AGENT_HTTP_CONNECTION_TIMEOUT_SECONDS:10}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:*}
  db:
    management-name: ${MANAGEMENT_DB_NAME:management_db}
